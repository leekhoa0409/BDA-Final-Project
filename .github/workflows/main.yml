name: Weather Pipeline CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f tests/requirements.txt ]; then pip install -r tests/requirements.txt; fi
        # Cài đặt thêm các dependencies của airflow nếu cần để check DAG integrity
        if [ -f airflow/requirements.txt ]; then pip install -r airflow/requirements.txt; fi

    - name: Run Unit Tests
      run: |
        # Chạy các test được đánh dấu là 'unit' (không yêu cầu Docker/S3 thật)
        pytest -m unit
