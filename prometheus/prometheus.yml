global:
  scrape_interval: 15s

scrape_configs:
  # Prometheus self
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # Docker containers (CPU/RAM)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']


  # Spark Master
  - job_name: 'spark-master'
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ['spark-master:8080']

  # Spark Worker
  - job_name: 'spark-worker'
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ['spark-worker:8081']

  - job_name: 'airflow-exporter'
    static_configs:
      - targets: ['airflow-exporter:9102']